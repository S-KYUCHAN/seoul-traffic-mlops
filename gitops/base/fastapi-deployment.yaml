apiVersion: apps/v1
kind: Deployment
metadata:
  name: seoul-traffic-fastapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seoul-traffic-fastapi
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: seoul-traffic-fastapi
    spec:
      containers:
      - env:
        - name: MODEL_DIR
          value: /model/v1
        - name: ARTIFACT_DIR
          value: /artifact/v1
        image: seoul-traffic-fastapi:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 20
          successThreshold: 1
          timeoutSeconds: 1
        name: seoul-traffic-fastapi
        ports:
        - containerPort: 8080
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /model
          name: model-volume
        - mountPath: /artifact
          name: artifact-volume
      volumes:
      - name: model-volume
        persistentVolumeClaim:
          claimName: model-pvc
      - name: artifact-volume
        persistentVolumeClaim:
          claimName: artifacts-pvc